<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Dice</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0f1a;
    }

    #stopBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
      font-weight: bold;
    }
  </style>
</head>
<body>

<button id="stopBtn">Stop Dice</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ================= SCENE ================= */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ================= LIGHT ================= */
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

/* ================= DICE TEXTURES ================= */
function createDiceFace(dots) {
  const size = 256;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "white";
  ctx.fillRect(0,0,size,size);

  ctx.fillStyle = "black";

  function dot(x,y){
    ctx.beginPath();
    ctx.arc(x,y,20,0,Math.PI*2);
    ctx.fill();
  }

  const p = {
    c:[128,128], tl:[60,60], tr:[196,60],
    bl:[60,196], br:[196,196],
    ml:[60,128], mr:[196,128]
  };

  const map = {
    1:["c"],
    2:["tl","br"],
    3:["tl","c","br"],
    4:["tl","tr","bl","br"],
    5:["tl","tr","c","bl","br"],
    6:["tl","tr","ml","mr","bl","br"]
  };

  map[dots].forEach(pos => dot(...p[pos]));
  return new THREE.CanvasTexture(canvas);
}

const materials = [1,2,3,4,5,6].map(n =>
  new THREE.MeshStandardMaterial({ map: createDiceFace(n) })
);

const cube = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), materials);
scene.add(cube);

/* ================= SNOW ================= */
const snowGeo = new THREE.BufferGeometry();
const snowArr = [];

for (let i=0;i<1000;i++){
  snowArr.push(
    (Math.random()-0.5)*50,
    Math.random()*50,
    (Math.random()-0.5)*50
  );
}

snowGeo.setAttribute("position", new THREE.Float32BufferAttribute(snowArr,3));

const snow = new THREE.Points(
  snowGeo,
  new THREE.PointsMaterial({ color:0xffffff, size:0.2 })
);
scene.add(snow);

/* ================= STATE ================= */
let velocity = { x: 0.06, y: 0.05 };
let rolling = true;
let moving = true;

/* ================= STOP BUTTON ================= */
document.getElementById("stopBtn").addEventListener("click", (e) => {
  e.stopPropagation(); // prevent triggering resume

  rolling = false;
  moving = false;

  // move to center
  cube.position.set(0,0,0);

  // snap to random face
  const faces = [
    [0,0],
    [Math.PI/2,0],
    [-Math.PI/2,0],
    [0,Math.PI/2],
    [0,-Math.PI/2],
    [Math.PI,0]
  ];

  const choice = faces[Math.floor(Math.random()*faces.length)];
  cube.rotation.x = choice[0];
  cube.rotation.y = choice[1];
});

/* ================= CLICK TO RESUME ================= */
window.addEventListener("click", () => {
  rolling = true;
  moving = true;
});

/* ================= BOUNDS ================= */
function getBounds() {
  const distance = camera.position.z;
  const vFOV = THREE.MathUtils.degToRad(camera.fov);

  const height = 2 * Math.tan(vFOV / 2) * distance;
  const width = height * camera.aspect;

  return {
    x: width / 2 - 1,
    y: height / 2 - 1
  };
}

/* ================= ANIMATE ================= */
function animate() {
  requestAnimationFrame(animate);

  // rotation
  if (rolling) {
    cube.rotation.x += 0.05;
    cube.rotation.y += 0.05;
  }

  // movement
  if (moving) {
    cube.position.x += velocity.x;
    cube.position.y += velocity.y;

    const bounds = getBounds();

    if (cube.position.x > bounds.x || cube.position.x < -bounds.x) {
      velocity.x *= -1;
    }

    if (cube.position.y > bounds.y || cube.position.y < -bounds.y) {
      velocity.y *= -1;
    }
  }

  // snow
  const arr = snow.geometry.attributes.position.array;
  for (let i = 1; i < arr.length; i += 3) {
    arr[i] -= 0.1;
    if (arr[i] < -10) arr[i] = 20;
  }
  snow.geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}

animate();

/* ================= RESIZE ================= */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
