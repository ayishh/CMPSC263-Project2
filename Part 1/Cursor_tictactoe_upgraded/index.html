<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe — You vs Computer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Tic Tac Toe</h1>
      <p class="subtitle">You are <span class="mark-x">X</span> · Computer is <span class="mark-o">O</span></p>
    </header>

    <div class="status" id="status" role="status" aria-live="polite">Your turn</div>

    <div class="board" id="board" aria-label="Tic tac toe board">
      <button type="button" class="cell" data-index="0" aria-label="Cell 1"></button>
      <button type="button" class="cell" data-index="1" aria-label="Cell 2"></button>
      <button type="button" class="cell" data-index="2" aria-label="Cell 3"></button>
      <button type="button" class="cell" data-index="3" aria-label="Cell 4"></button>
      <button type="button" class="cell" data-index="4" aria-label="Cell 5"></button>
      <button type="button" class="cell" data-index="5" aria-label="Cell 6"></button>
      <button type="button" class="cell" data-index="6" aria-label="Cell 7"></button>
      <button type="button" class="cell" data-index="7" aria-label="Cell 8"></button>
      <button type="button" class="cell" data-index="8" aria-label="Cell 9"></button>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="reset">New game</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
